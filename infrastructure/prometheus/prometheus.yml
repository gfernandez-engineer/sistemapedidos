global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'users-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['users-service:8081']

  - job_name: 'orders-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['orders-service:8082']

  - job_name: 'catalog-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['catalog-service:8083']

  - job_name: 'payments-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payments-service:8084']

  - job_name: 'deliveries-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['deliveries-service:8085']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
