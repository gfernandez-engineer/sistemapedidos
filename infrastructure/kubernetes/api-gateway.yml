apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: food-ordering
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: food-ordering/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: USERS_SERVICE_URL
              value: http://users-service:8081
            - name: ORDERS_SERVICE_URL
              value: http://orders-service:8082
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:8083
            - name: PAYMENTS_SERVICE_URL
              value: http://payments-service:8084
            - name: DELIVERIES_SERVICE_URL
              value: http://deliveries-service:8085
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: food-ordering
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: food-ordering
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
