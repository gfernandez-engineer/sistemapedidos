apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: food-ordering-ingress
  namespace: food-ordering
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.food-ordering.local
      http:
        paths:
          - path: /api/v1/users
            pathType: Prefix
            backend:
              service:
                name: users-service
                port:
                  number: 8081
          - path: /api/v1/orders
            pathType: Prefix
            backend:
              service:
                name: orders-service
                port:
                  number: 8082
          - path: /api/v1/restaurants
            pathType: Prefix
            backend:
              service:
                name: catalog-service
                port:
                  number: 8083
          - path: /api/v1/products
            pathType: Prefix
            backend:
              service:
                name: catalog-service
                port:
                  number: 8083
          - path: /api/v1/payments
            pathType: Prefix
            backend:
              service:
                name: payments-service
                port:
                  number: 8084
          - path: /api/v1/deliveries
            pathType: Prefix
            backend:
              service:
                name: deliveries-service
                port:
                  number: 8085
          - path: /api/v1/drivers
            pathType: Prefix
            backend:
              service:
                name: deliveries-service
                port:
                  number: 8085
