# Global values shared across all subcharts
global:
  namespace: food-ordering
  imageRegistry: food-ordering
  imagePullPolicy: IfNotPresent
  kafka:
    bootstrapServers: kafka:9092
  jwt:
    issuerUri: http://keycloak:8080/realms/food-ordering

# Subchart toggles
users-service:
  enabled: true
  replicaCount: 2
  image:
    repository: food-ordering/users-service
    tag: latest
  service:
    port: 8081
  database:
    host: users-db
    port: 5432
    name: users_db
    secretName: users-db-secret
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPU: 70

