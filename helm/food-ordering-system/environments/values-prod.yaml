# Production environment overrides
global:
  namespace: food-ordering-prod
  imagePullPolicy: IfNotPresent

users-service:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 10
    targetCPU: 60
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

orders-service:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 10
    targetCPU: 60
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

