# E2E testing environment overrides
# Uses nosecurity profile (no Keycloak required)
# Deploys infrastructure (databases + Kafka) in K8s

global:
  namespace: food-ordering-e2e
  imagePullPolicy: Never
  springProfiles: nosecurity
  kafka:
    bootstrapServers: kafka:9092
  jwt:
    issuerUri: ""
  jpa:
    ddlAuto: update
  javaOpts: "-Xmx180m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=100m"

# Infrastructure (databases + Kafka deployed in K8s)
infrastructure:
  enabled: true
  databaseStorage: 512Mi
  databaseResources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"

# All services: 1 replica, no HPA, minimal resources
users-service:
  replicaCount: 1
  autoscaling:
    enabled: false
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "300Mi"
      cpu: "500m"

