apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "users-service.fullname" . }}
  namespace: {{ .Values.global.namespace | default "food-ordering" }}
  labels:
    {{- include "users-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "users-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "users-service.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: users-service
          image: "{{ .Values.image.repository }}:{{ .Values.global.imageTag | default .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.global.kafka.bootstrapServers | default "kafka:9092" }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: {{ .Values.global.jwt.issuerUri | default "http://keycloak:8080/realms/food-ordering" }}
            {{- if .Values.global.springProfiles }}
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.global.springProfiles }}
            {{- end }}
            {{- if .Values.global.jpa }}
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: {{ .Values.global.jpa.ddlAuto | default "validate" }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
