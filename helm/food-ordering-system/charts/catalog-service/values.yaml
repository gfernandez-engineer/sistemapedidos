replicaCount: 2
image:
  repository: food-ordering/catalog-service
  tag: latest
service:
  port: 8083
  type: ClusterIP
database:
  secretName: catalog-db-secret
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 70
