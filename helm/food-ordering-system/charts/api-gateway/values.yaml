replicaCount: 2
image:
  repository: food-ordering/api-gateway
  tag: latest
service:
  port: 8080
  type: LoadBalancer
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 70
